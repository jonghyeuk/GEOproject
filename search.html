<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - EduAtlas</title>
  <meta name="description" content="교육, 연구, 기술 문서 검색">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="container page-content">
    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep">›</span>
      <span>Search</span>
    </div>

    <h1 class="section-title">Search</h1>

    <div class="search-bar search-bar-simple" style="margin-bottom:24px;">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="검색어를 입력하세요..." autofocus>
    </div>

    <div id="searchMeta" style="font-size:14px; color:var(--gray-400); margin-bottom:20px;"></div>

    <div class="card-grid" id="searchResults"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">🔍</div>
      <h3>검색 결과가 없습니다</h3>
      <p>다른 키워드로 검색해보세요</p>
    </div>

    <!-- 인기 태그 (검색어 없을 때) -->
    <div id="tagSuggestions" style="margin-top:40px;">
      <h2 class="section-title">인기 태그</h2>
      <div class="tag-list" id="popularTags" style="gap:10px;"></div>
    </div>
  </div>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="data/documents.js"></script>
  <script src="js/app.js"></script>
  <script>
  function pageInit() {
    const input = document.getElementById('searchInput');
    const q = getParam('q');

    // popular tags
    const tags = getAllTags();
    document.getElementById('popularTags').innerHTML = tags.map(([t, c]) =>
      `<a href="tag.html?t=${encodeURIComponent(t)}" class="tag" style="font-size:14px; padding:8px 16px;">${t} (${c})</a>`
    ).join('');

    if (q) {
      input.value = q;
      doSearch(q);
    }

    input.addEventListener('input', () => {
      const val = input.value.trim();
      if (val) doSearch(val);
      else clearSearch();
    });
  }

  function doSearch(q) {
    const results = searchDocuments(q);
    const grid = document.getElementById('searchResults');
    const empty = document.getElementById('emptyState');
    const meta = document.getElementById('searchMeta');
    const suggestions = document.getElementById('tagSuggestions');

    suggestions.style.display = 'none';
    meta.textContent = `"${q}" 검색 결과: ${results.length}개 문서`;

    if (results.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      grid.innerHTML = results.map(d => renderDocCard(d)).join('');
    }
  }

  function clearSearch() {
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('searchMeta').textContent = '';
    document.getElementById('tagSuggestions').style.display = 'block';
  }
  </script>
</body>
</html>
