  <style>
    .demo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:24px; margin-top:24px; }
    .demo-card { background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius-lg); overflow:hidden; transition:all 0.3s; cursor:pointer; }
    .demo-card:hover { border-color:var(--primary); transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.08); }
    .demo-preview { height:200px; display:flex; align-items:center; justify-content:center; font-size:80px; position:relative; overflow:hidden; }
    .demo-preview.chem { background:linear-gradient(135deg,#0a0e1a,#1a2236); }
    .demo-preview .preview-label { position:absolute; bottom:12px; right:12px; font-size:11px; padding:4px 10px; border-radius:6px; font-weight:600; }
    .demo-preview .preview-label.live { background:rgba(57,255,20,0.15); color:#39ff14; border:1px solid rgba(57,255,20,0.3); }
    .demo-preview .preview-label.coming { background:rgba(255,214,0,0.15); color:#ffd600; border:1px solid rgba(255,214,0,0.3); }
    .demo-body { padding:20px 24px 24px; }
    .demo-body h3 { font-size:18px; font-weight:700; color:var(--gray-900); margin-bottom:6px; }
    .demo-body p { font-size:14px; color:var(--gray-500); line-height:1.6; margin-bottom:12px; }
    .demo-tags { display:flex; gap:6px; flex-wrap:wrap; }
    .demo-tags .tag { font-size:11px; }
    .hero-interactive { text-align:center; padding:48px 0 32px; }
    .hero-interactive h1 { font-size:clamp(28px,5vw,40px); font-weight:800; color:var(--gray-900); margin-bottom:8px; }
    .hero-interactive p { font-size:16px; color:var(--gray-500); max-width:600px; margin:0 auto; }
    .hero-interactive .icon-large { font-size:64px; margin-bottom:16px; }
    .stats-bar { display:flex; gap:24px; justify-content:center; margin:24px 0; flex-wrap:wrap; }
    .stat-item { text-align:center; padding:16px 24px; background:var(--gray-50); border-radius:var(--radius); }
    .stat-item .stat-num { font-size:28px; font-weight:800; color:var(--primary); }
    .stat-item .stat-label { font-size:12px; color:var(--gray-400); margin-top:4px; }

<body>
  <div id="site-header"></div>

  <div class="container page-content">
    <div class="breadcrumb">
      <a href="index.html">홈</a>

    </div>

    <div class="hero-interactive">
      <div class="icon-large">🎮</div>
      <h1>인터랙티브 시뮬레이션</h1>
      <p>과학 원리를 직접 체험하는 인터랙티브 시뮬레이션.<br>슬라이더를 움직이고, 변수를 바꾸고, 결과를 확인하세요.</p>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <h2 class="section-title">시뮬레이션 목록</h2>
    <div class="demo-grid" id="demoGrid"></div>

    <!-- Coming Soon -->
    <h2 class="section-title" style="margin-top:48px;">Coming Soon</h2>
    <p class="section-subtitle">개발 중인 시뮬레이션</p>
    <div class="demo-grid">
      <div class="demo-card" style="opacity:0.6; cursor:default;">
        <div class="demo-preview" style="background:linear-gradient(135deg,#1a1a2e,#16213e);">
          🌊
          <span class="preview-label coming">COMING SOON</span>
        </div>
        <div class="demo-body">
          <h3>파동 간섭 시뮬레이터</h3>
          <p>이중 슬릿 실험과 파동의 간섭·회절을 시각적으로 체험합니다.</p>
          <div class="demo-tags"><span class="tag">물리</span><span class="tag">파동</span><span class="tag">간섭</span></div>
        </div>
      </div>
      <div class="demo-card" style="opacity:0.6; cursor:default;">
        <div class="demo-preview" style="background:linear-gradient(135deg,#0d1117,#161b22);">
          ⚡
          <span class="preview-label coming">COMING SOON</span>
        </div>
        <div class="demo-body">
          <h3>전기 회로 시뮬레이터</h3>
          <p>직렬·병렬 회로를 구성하고 옴의 법칙을 검증합니다.</p>
          <div class="demo-tags"><span class="tag">물리</span><span class="tag">전기</span><span class="tag">옴의법칙</span></div>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/data/documents.js"></script>
  <script src="/data/hanam-academies.js"></script>
  <script src="/js/app.js"></script>
  <script>
  function pageInit() {
    const docs = getDocumentsByCategory('simulation')
      .filter(d => d.status === 'published')
      .sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));

    // Stats
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-item"><div class="stat-num">${docs.length}</div><div class="stat-label">시뮬레이션</div></div>
      <div class="stat-item"><div class="stat-num">${[...new Set(docs.flatMap(d => d.tags))].length}</div><div class="stat-label">관련 주제</div></div>
      <div class="stat-item"><div class="stat-num">2</div><div class="stat-label">개발 예정</div></div>
    `;

    // Demo cards
    const previewConfig = {
      'beer-lambert-law-simulator': { emoji:'🔬', bg:'linear-gradient(135deg,#0a0e1a,#1a2236)', cls:'chem' },
      'planck-constant-led-simulator': { emoji:'💡', bg:'linear-gradient(135deg,#0a0e1a,#1a1a2e)', cls:'' },
      'ideal-gas-law-simulator': { emoji:'🎈', bg:'linear-gradient(135deg,#0a0e1a,#1a2236)', cls:'' }
    };

    document.getElementById('demoGrid').innerHTML = docs.map(d => {
      const cfg = previewConfig[d.slug] || { emoji:'🧪', bg:'linear-gradient(135deg,#1a1a2e,#16213e)', cls:'' };
      const url = (d.technicalMeta && d.technicalMeta.externalUrl) || ('/documents/' + d.slug);
      return `
      <div class="demo-card" onclick="location.href='${url}'">
        <div class="demo-preview ${cfg.cls}" style="background:${cfg.bg}">
          ${cfg.emoji}
          <span class="preview-label live">LIVE</span>
        </div>
        <div class="demo-body">
          <h3>${d.title}</h3>
          <p>${d.summary.substring(0, 100)}...</p>
          <div class="demo-tags">
            ${d.tags.slice(0, 5).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </div>
      </div>`;
    }).join('');
  }
  </script>
