<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리 - 과학 교육 지식 분류 - EduAtlas</title>
  <meta name="description" content="이론·원리, 실험방법, 실험장치, 시뮬레이션 — 과학 교육 지식을 분야별로 탐색하세요">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://geoproject-8fc76.web.app/categories.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="카테고리 - 과학 교육 지식 분류 - EduAtlas">
  <meta property="og:description" content="이론·원리, 실험방법, 실험장치, 시뮬레이션 — 과학 교육 지식을 분야별로 탐색하세요">
  <meta property="og:url" content="https://geoproject-8fc76.web.app/categories.html">
  <meta property="og:site_name" content="EduAtlas">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="container page-content">
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">홈</a>
      <span class="sep">›</span>
      <span>카테고리</span>
    </div>

    <div id="pageContent"></div>
  </div>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="data/documents.js"></script>
  <script src="js/app.js"></script>
  <script>
  function pageInit() {
    // Support both clean URLs (/categories/theory) and query params (?id=theory)
    let catId = getParam('id');
    if (!catId) {
      const pathParts = location.pathname.split('/').filter(Boolean);
      if (pathParts.length >= 2 && pathParts[0] === 'categories') {
        catId = pathParts[1];
      }
    }

    if (catId) {
      renderCategoryDetail(catId);
    } else {
      renderCategoryList();
    }
  }

  function renderCategoryList() {
    const content = document.getElementById('pageContent');
    content.innerHTML = `
      <h1 class="section-title">카테고리</h1>
      <p class="section-subtitle">과학 교육 지식을 분야별로 탐색하세요</p>
      <div id="catCards"></div>`;

    const cards = CATEGORIES.map(cat => {
      const docs = getDocumentsByCategory(cat.id);
      const tags = {};
      docs.forEach(d => d.tags.forEach(t => { tags[t] = (tags[t]||0)+1; }));
      const topTags = Object.entries(tags).sort((a,b) => b[1]-a[1]).slice(0,5);

      return `
      <div style="background:white; border:1px solid var(--gray-200); border-radius:var(--radius); padding:28px; margin-bottom:20px; cursor:pointer;" onclick="location.href='/categories/${cat.id}'">
        <div style="display:flex; align-items:center; gap:16px; margin-bottom:12px;">
          <span style="font-size:36px;">${cat.icon}</span>
          <div>
            <div style="font-size:20px; font-weight:700; color:var(--gray-900);">${cat.name}</div>
            <div style="font-size:14px; color:var(--gray-400);">${cat.nameKo} · ${docs.length}개 문서</div>
          </div>
        </div>
        <p style="font-size:14px; color:var(--gray-500); margin-bottom:12px;">${cat.description}</p>
        <div style="margin-bottom:12px;">
          <span style="font-size:12px; color:var(--gray-400);">하위 분류: </span>
          ${cat.subcategories.map(s => `<span class="tag">${s}</span>`).join(' ')}
        </div>
        ${topTags.length ? `<div><span style="font-size:12px; color:var(--gray-400);">인기 태그: </span>${topTags.map(([t]) => `<span class="tag">${t}</span>`).join(' ')}</div>` : ''}
      </div>`;
    }).join('');

    document.getElementById('catCards').innerHTML = cards;
  }

  function renderCategoryDetail(catId) {
    const cat = getCategoryById(catId);
    if (!cat) {
      document.getElementById('pageContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📂</div>
          <h3>카테고리를 찾을 수 없습니다</h3>
          <p><a href="categories.html">카테고리 목록으로</a></p>
        </div>`;
      return;
    }

    document.title = cat.name + ' - ' + cat.nameKo + ' - EduAtlas';
    document.querySelector('meta[name="description"]').content = cat.description + ' - EduAtlas ' + cat.name;

    // CollectionPage schema
    const collectionSchema = {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": cat.name + ' - ' + cat.nameKo,
      "description": cat.description,
      "url": "https://geoproject-8fc76.web.app/categories/" + cat.id,
      "isPartOf": { "@type": "WebSite", "name": "EduAtlas", "url": "https://geoproject-8fc76.web.app/" }
    };
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.textContent = JSON.stringify(collectionSchema);
    document.head.appendChild(s);

    // breadcrumb
    document.getElementById('breadcrumb').innerHTML = `
      <a href="index.html">홈</a><span class="sep">›</span>
      <a href="categories.html">카테고리</a><span class="sep">›</span>
      <span>${cat.nameKo}</span>`;

    const docs = getDocumentsByCategory(cat.id).sort((a,b) => b.updatedAt.localeCompare(a.updatedAt));
    const tags = {};
    const typeDist = {};
    docs.forEach(d => {
      d.tags.forEach(t => { tags[t] = (tags[t]||0)+1; });
      typeDist[d.docType] = (typeDist[d.docType] || 0) + 1;
    });
    const topTags = Object.entries(tags).sort((a,b) => b[1]-a[1]).slice(0,12);

    // 문서 유형 분포
    const typeLabels = { article: '이론/원리', topic: '탐구 주제', guide: '실험 가이드', interactive: '시뮬레이션', concept: '개념' };
    const typeStats = Object.entries(typeDist).map(([type, count]) =>
      `<span style="font-size:13px; padding:6px 14px; background:var(--gray-100); border-radius:20px; color:var(--gray-600);">${typeLabels[type] || type} (${count})</span>`
    ).join('');

    document.getElementById('pageContent').innerHTML = `
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:8px;">
        <span style="font-size:48px;">${cat.icon}</span>
        <div>
          <h1 style="font-size:28px; font-weight:800; color:var(--gray-900);">${cat.name}</h1>
          <p style="color:var(--gray-500);">${cat.nameKo} · ${docs.length}개 문서</p>
        </div>
      </div>
      <p style="color:var(--gray-600); margin-bottom:24px;">${cat.description}</p>

      <!-- 통계 -->
      <div style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
        ${typeStats}
      </div>

      <!-- 하위 분류 -->
      <div style="margin-bottom:24px;">
        <h3 style="font-size:14px; color:var(--gray-500); margin-bottom:8px;">하위 분류</h3>
        <div class="tag-list">
          ${cat.subcategories.map(s => `<a href="search.html?q=${encodeURIComponent(s)}" class="tag" style="font-size:13px; padding:6px 14px;">${s}</a>`).join('')}
        </div>
      </div>

      <!-- 인기 태그 -->
      ${topTags.length ? `
      <div style="margin-bottom:32px;">
        <h3 style="font-size:14px; color:var(--gray-500); margin-bottom:8px;">인기 태그</h3>
        <div class="tag-list">
          ${topTags.map(([t,c]) => `<a href="tag.html?t=${encodeURIComponent(t)}" class="tag">${t} (${c})</a>`).join('')}
        </div>
      </div>` : ''}

      <!-- 문서 목록 -->
      <h2 class="section-title">문서 목록</h2>
      ${docs.length ? `<div class="card-grid">${docs.map(d => renderDocCard(d)).join('')}</div>` :
        `<div class="empty-state"><div class="empty-icon">📄</div><h3>아직 문서가 없습니다</h3></div>`}
    `;
  }
  </script>
</body>
</html>
