<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="canonical" href="https://geoproject-8fc76.web.app/">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="EduAtlas - 과학 교육 지식 데이터베이스">
  <meta property="og:description" content="AI가 인용하는 과학 교육 지식 DB. 이론·원리, 실험방법, 실험장치, 인터랙티브 시뮬레이션을 구조화하여 제공합니다.">
  <meta property="og:url" content="https://geoproject-8fc76.web.app/">
  <meta property="og:site_name" content="EduAtlas">
  <meta property="og:locale" content="ko_KR">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="EduAtlas - 과학 교육 지식 데이터베이스">
  <meta name="twitter:description" content="AI가 인용하는 과학 교육 지식 DB">

  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "EduAtlas",
    "alternateName": "에듀아틀라스",
    "description": "AI가 인용하는 과학 교육 지식 데이터베이스 — 이론, 실험, 시뮬레이션",
    "url": "https://geoproject-8fc76.web.app/",
    "inLanguage": "ko",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://geoproject-8fc76.web.app/search.html?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "EduAtlas",
    "description": "한국어 과학 교육 지식 데이터베이스",
    "url": "https://geoproject-8fc76.web.app/",
    "areaServed": { "@type": "Country", "name": "KR" },
    "teaches": ["물리", "화학", "생물", "지구과학", "과학실험"]
  }
  </script>
</head>
<body>
  <div id="site-header"></div>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <h1>과학 교육<br>지식 데이터베이스</h1>
      <p>이론·원리 · 실험방법 · 실험장치 · 시뮬레이션<br>AI가 인용하는 구조화된 과학 교육 콘텐츠</p>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="heroSearch" placeholder="검색... (예: 플랑크 상수, Beer-Lambert, 이상기체)" autocomplete="off">
      </div>
    </div>
  </section>

  <div class="container page-content">
    <!-- 카테고리 -->
    <h2 class="section-title">지식 카테고리</h2>
    <p class="section-subtitle">과학 교육 콘텐츠를 탐색하세요</p>
    <div class="cat-grid" id="catGrid"></div>

    <!-- 최근 문서 -->
    <h2 class="section-title" style="margin-top:48px">최근 문서</h2>
    <p class="section-subtitle">최근 업데이트된 콘텐츠</p>
    <div class="card-grid" id="latestDocs"></div>
  </div>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="data/documents.js"></script>
  <script src="js/app.js"></script>
  <script>
  function pageInit() {
    // Categories
    document.getElementById('catGrid').innerHTML = CATEGORIES.map(c => renderCatCard(c)).join('');

    // Latest docs
    const docs = getAllDocuments().filter(d => d.status === 'published')
      .sort((a, b) => b.updatedAt.localeCompare(a.updatedAt))
      .slice(0, 6);
    document.getElementById('latestDocs').innerHTML = docs.map(d => renderDocCard(d)).join('');

    // Search redirect
    document.getElementById('heroSearch').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        location.href = 'search.html?q=' + encodeURIComponent(e.target.value.trim());
      }
    });
  }
  </script>
</body>
</html>
