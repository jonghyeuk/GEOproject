<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduAtlas - Explore Education Atlas</title>
  <meta name="description" content="교육 데이터를 지도처럼 탐색하는 플랫폼. Academies, Research, Topics, Experiments, Study Methods를 한곳에서.">
  <link rel="canonical" href="https://geoproject-8fc76.web.app/">
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "EduAtlas",
    "description": "Explore Education Atlas — 교육 데이터를 지도처럼 탐색하는 플랫폼",
    "url": "https://geoproject-8fc76.web.app/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://geoproject-8fc76.web.app/search.html?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body>
  <div id="site-header"></div>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <h1>Explore<br>Education Atlas</h1>
      <p>Academies · Research · Topics · Experiments · Study Methods<br>교육 데이터를 지도처럼 탐색하세요</p>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="heroSearch" placeholder="문서 검색... (예: 반도체, 과학탐구, 공부법)" autocomplete="off">
      </div>
    </div>
  </section>

  <div class="container page-content">
    <!-- Atlas Map -->
    <h2 class="section-title">Atlas Map</h2>
    <p class="section-subtitle">교육 지도를 탐색하세요</p>
    <div class="cat-grid" id="catGrid"></div>

    <!-- Latest Documents -->
    <h2 class="section-title" style="margin-top:48px">Latest</h2>
    <p class="section-subtitle">최근 업데이트된 문서</p>
    <div class="card-grid" id="latestDocs"></div>

    <!-- GEO Builder CTA -->
    <div style="margin-top:48px; text-align:center; padding:48px 0; background:linear-gradient(135deg,#f0f9ff,#ede9fe); border-radius:var(--radius-lg);">
      <h2 style="font-size:24px; font-weight:700; color:var(--gray-900); margin-bottom:12px;">GEO Builder</h2>
      <p style="color:var(--gray-500); margin-bottom:24px; max-width:480px; margin-left:auto; margin-right:auto;">교육 기관을 위한 AI 최적화 페이지를 자동 생성합니다.<br>기관 소개, 지역+과목, 교육 특징 페이지를 한번에.</p>
      <a href="geo-builder.html" class="btn btn-primary btn-lg">GEO Builder 시작하기 →</a>
    </div>

    <!-- Connected Services -->
    <h2 class="section-title" style="margin-top:48px">Connected Services</h2>
    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px;" id="serviceGrid"></div>
  </div>

  <div id="site-footer"></div>

  <script src="data/documents.js"></script>
  <script src="js/app.js"></script>
  <script>
  function pageInit() {
    // Categories
    document.getElementById('catGrid').innerHTML = CATEGORIES.map(c => renderCatCard(c)).join('');

    // Latest docs
    const docs = getAllDocuments().filter(d => d.status === 'published')
      .sort((a, b) => b.updatedAt.localeCompare(a.updatedAt))
      .slice(0, 6);
    document.getElementById('latestDocs').innerHTML = docs.map(d => renderDocCard(d)).join('');

    // Services
    document.getElementById('serviceGrid').innerHTML = SERVICES.map(s => `
      <div class="service-banner" onclick="location.href='services.html'">
        <div class="service-icon">${s.icon}</div>
        <div class="service-info">
          <h3>${s.name}</h3>
          <p>${s.description}</p>
        </div>
      </div>
    `).join('');

    // Search redirect
    document.getElementById('heroSearch').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        location.href = 'search.html?q=' + encodeURIComponent(e.target.value.trim());
      }
    });
  }
  </script>
</body>
</html>
