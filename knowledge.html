<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="과학 이론, 실험방법, 실험장치, 시뮬레이션 등 구조화된 과학 교육 지식 문서 목록">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
  <link rel="canonical" href="https://geoproject-8fc76.web.app/knowledge.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="지식 DB - 과학 교육 문서 - EduAtlas">
  <meta property="og:description" content="과학 이론, 실험방법, 실험장치, 시뮬레이션 등 구조화된 과학 교육 지식 문서 목록">
  <meta property="og:url" content="https://geoproject-8fc76.web.app/knowledge.html">
  <meta property="og:site_name" content="EduAtlas">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="지식 DB - 과학 교육 문서 - EduAtlas">
  <meta name="twitter:description" content="과학 이론, 실험방법, 실험장치, 시뮬레이션 등 구조화된 과학 교육 지식 문서 목록">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="container page-content">
    <div class="breadcrumb">
      <a href="index.html">홈</a>
      <span class="sep">›</span>
      <span>지식 DB</span>
    </div>

    <h1 class="section-title">지식 DB</h1>
    <p class="section-subtitle">과학 교육 문서를 탐색하세요</p>

    <!-- Filters -->
    <div style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:center;">
      <div class="search-bar search-bar-simple" style="flex:1; min-width:240px;">
        <span class="search-icon">🔍</span>
        <input type="text" id="filterSearch" placeholder="문서 검색...">
      </div>
      <select id="filterCategory" style="padding:10px 14px; border:1px solid var(--gray-300); border-radius:var(--radius-sm); font-size:14px; background:white; cursor:pointer;">
        <option value="">전체 카테고리</option>
      </select>
      <select id="filterType" style="padding:10px 14px; border:1px solid var(--gray-300); border-radius:var(--radius-sm); font-size:14px; background:white; cursor:pointer;">
        <option value="">전체 유형</option>
        <option value="article">이론/원리 문서</option>
        <option value="topic">탐구 주제</option>
        <option value="guide">실험 가이드</option>
        <option value="interactive">시뮬레이션</option>
      </select>
    </div>

    <!-- Popular Tags -->
    <div style="margin-bottom:24px;">
      <span style="font-size:13px; color:var(--gray-400); margin-right:8px;">인기 태그:</span>
      <span class="tag-list" id="popularTags"></span>
    </div>

    <!-- Document List -->
    <div class="card-grid" id="docGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📄</div>
      <h3>검색 결과가 없습니다</h3>
      <p>다른 키워드로 검색해보세요</p>
    </div>
  </div>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="data/documents.js"></script>
  <script src="js/app.js"></script>
  <script>
  function pageInit() {
    // category filter options
    const catSelect = document.getElementById('filterCategory');
    CATEGORIES.forEach(c => {
      catSelect.innerHTML += `<option value="${c.id}">${c.icon} ${c.nameKo}</option>`;
    });

    // popular tags
    const tags = getAllTags().slice(0, 8);
    document.getElementById('popularTags').innerHTML = tags.map(([t]) =>
      `<a href="tag.html?t=${encodeURIComponent(t)}" class="tag">${t}</a>`
    ).join('');

    // initial render
    renderDocs();

    // filters
    document.getElementById('filterSearch').addEventListener('input', renderDocs);
    document.getElementById('filterCategory').addEventListener('change', renderDocs);
    document.getElementById('filterType').addEventListener('change', renderDocs);

    // check URL param
    const catParam = getParam('category');
    if (catParam) {
      document.getElementById('filterCategory').value = catParam;
      renderDocs();
    }
  }

  function renderDocs() {
    const query = document.getElementById('filterSearch').value.toLowerCase();
    const cat = document.getElementById('filterCategory').value;
    const type = document.getElementById('filterType').value;

    let docs = getAllDocuments().filter(d => d.status === 'published');

    if (query) {
      docs = docs.filter(d =>
        d.title.toLowerCase().includes(query) ||
        d.summary.toLowerCase().includes(query) ||
        d.tags.some(t => t.toLowerCase().includes(query))
      );
    }
    if (cat) docs = docs.filter(d => d.categoryId === cat);
    if (type) docs = docs.filter(d => d.docType === type);

    docs.sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));

    const grid = document.getElementById('docGrid');
    const empty = document.getElementById('emptyState');

    if (docs.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      grid.innerHTML = docs.map(d => renderDocCard(d)).join('');
    }
  }
  </script>
</body>
</html>
