<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document - EduAtlas</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="container page-content">
    <div class="breadcrumb" id="breadcrumb"></div>

    <div class="doc-layout">
      <!-- Main Content -->
      <div>
        <div class="doc-header" id="docHeader"></div>
        <div class="direct-answer-box" id="directAnswer"></div>
        <div class="key-info-box" id="keyInfo"></div>
        <div class="doc-body" id="docBody"></div>
        <div class="faq-section" id="faqSection"></div>
        <div class="author-section" id="authorSection"></div>
        <div class="error-report" style="margin-top:24px; padding:12px 16px; background:#f8f9fa; border-radius:8px; font-size:0.9rem; color:#666;">
          정보에 오류가 있나요? <a href="contact.html" style="color:var(--primary-color); text-decoration:underline;">오류 제보하기</a>
        </div>
        <div style="margin-top:40px;" id="docTags"></div>
      </div>

      <!-- Sidebar -->
      <aside id="sidebar"></aside>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="data/documents.js"></script>
  <script src="js/app.js"></script>
  <script>
  function pageInit() {
    const slug = getParam('slug');
    if (!slug) { location.href = 'knowledge.html'; return; }

    const doc = getDocumentBySlug(slug);
    if (!doc) {
      document.querySelector('.page-content .doc-layout').innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">📄</div>
          <h3>문서를 찾을 수 없습니다</h3>
          <p><a href="knowledge.html">문서 목록으로 돌아가기</a></p>
        </div>`;
      return;
    }

    const cat = getCategoryById(doc.categoryId);

    // page title & meta (seoTitle 우선)
    document.title = (doc.seoTitle || doc.title) + ' - EduAtlas';
    document.querySelector('meta[name="description"]').content = doc.seoDescription || doc.summary;

    // --- JSON-LD: Article ---
    const articleSchema = {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": doc.title,
      "description": doc.seoDescription || doc.summary,
      "datePublished": doc.createdAt,
      "dateModified": doc.updatedAt,
      "author": doc.authorInfo
        ? { "@type": "Person", "name": doc.authorInfo.name, "jobTitle": doc.authorInfo.role }
        : { "@type": "Organization", "name": "EduAtlas" },
      "publisher": { "@type": "Organization", "name": "EduAtlas" },
      "articleSection": cat ? cat.nameKo : '',
      "keywords": doc.tags.join(', ')
    };
    const s1 = document.createElement('script');
    s1.type = 'application/ld+json';
    s1.textContent = JSON.stringify(articleSchema);
    document.head.appendChild(s1);

    // --- JSON-LD: FAQPage (faqItems가 있을 때만) ---
    if (doc.faqItems && doc.faqItems.length > 0) {
      const faqSchema = {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": doc.faqItems.map(faq => ({
          "@type": "Question",
          "name": faq.question,
          "acceptedAnswer": {
            "@type": "Answer",
            "text": faq.answer
          }
        }))
      };
      const s2 = document.createElement('script');
      s2.type = 'application/ld+json';
      s2.textContent = JSON.stringify(faqSchema);
      document.head.appendChild(s2);
    }

    // --- JSON-LD: EducationalOrganization (academy/company 문서) ---
    if (doc.docType === 'academy' || doc.docType === 'company') {
      const eduOrgSchema = {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": doc.title,
        "description": doc.seoDescription || doc.summary,
        "url": "https://geoproject-8fc76.web.app/document.html?slug=" + doc.slug
      };
      if (doc.keyInfo) {
        if (doc.keyInfo.location) eduOrgSchema.address = { "@type": "PostalAddress", "addressLocality": doc.keyInfo.location };
        if (doc.keyInfo.subjects) eduOrgSchema.knowsAbout = doc.keyInfo.subjects;
      }
      const s4 = document.createElement('script');
      s4.type = 'application/ld+json';
      s4.textContent = JSON.stringify(eduOrgSchema);
      document.head.appendChild(s4);
    }

    // --- JSON-LD: BreadcrumbList ---
    const breadcrumbSchema = {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "EduAtlas", "item": "https://geoproject-8fc76.web.app/" },
        cat ? { "@type": "ListItem", "position": 2, "name": cat.nameKo, "item": "https://geoproject-8fc76.web.app/categories.html?id=" + cat.id } : null,
        { "@type": "ListItem", "position": cat ? 3 : 2, "name": doc.title }
      ].filter(Boolean)
    };
    const s3 = document.createElement('script');
    s3.type = 'application/ld+json';
    s3.textContent = JSON.stringify(breadcrumbSchema);
    document.head.appendChild(s3);

    // breadcrumb (visible)
    document.getElementById('breadcrumb').innerHTML = `
      <a href="index.html">Explore</a><span class="sep">›</span>
      ${cat ? `<a href="categories.html?id=${cat.id}">${cat.nameKo}</a><span class="sep">›</span>` : ''}
      <span>${doc.title}</span>`;

    // header
    document.getElementById('docHeader').innerHTML = `
      ${cat ? `<a href="categories.html?id=${cat.id}" class="doc-category">${cat.icon} ${cat.nameKo}</a>` : ''}
      <h1>${doc.title}</h1>
      <p class="doc-summary">${doc.summary}</p>
      <div class="doc-meta">
        <span>${formatDate(doc.updatedAt)}</span>
        <span>${doc.docType}</span>
        ${doc.targetAudience ? `<span>${doc.targetAudience.join(', ')}</span>` : ''}
      </div>`;

    // directAnswer (있을 때만)
    if (doc.directAnswer && doc.directAnswer.length > 0) {
      document.getElementById('directAnswer').innerHTML = `
        <h3>핵심 답변</h3>
        ${doc.directAnswer.map(a => `<p>${a}</p>`).join('')}`;
    } else {
      document.getElementById('directAnswer').style.display = 'none';
    }

    // key info
    if (doc.keyInfo) {
      const items = Object.entries(doc.keyInfo).map(([k, v]) => `
        <div class="key-info-item">
          <span class="label">${k}</span>
          <span class="value">${v}</span>
        </div>`).join('');
      document.getElementById('keyInfo').innerHTML = `<h3>핵심 정보</h3>${items}`;
    } else {
      document.getElementById('keyInfo').style.display = 'none';
    }

    // body: contentBlocks 우선, 없으면 body(마크다운) fallback
    let bodyHTML;
    if (doc.contentBlocks && doc.contentBlocks.length > 0) {
      bodyHTML = renderContentBlocks(doc.contentBlocks);
    } else {
      bodyHTML = renderMarkdown(doc.body);
    }
    // 엔티티 자동 내부 링크
    bodyHTML = autoLinkEntities(bodyHTML, doc.slug);
    document.getElementById('docBody').innerHTML = bodyHTML;

    // FAQ section (있을 때만)
    if (doc.faqItems && doc.faqItems.length > 0) {
      document.getElementById('faqSection').innerHTML = `
        <h2>자주 묻는 질문</h2>
        <div class="faq-list">
          ${doc.faqItems.map(faq => `
            <details class="faq-item">
              <summary class="faq-question">${faq.question}</summary>
              <div class="faq-answer">${faq.answer}</div>
            </details>`).join('')}
        </div>`;
    } else {
      document.getElementById('faqSection').style.display = 'none';
    }

    // author section (있을 때만)
    if (doc.authorInfo) {
      document.getElementById('authorSection').innerHTML = `
        <div class="author-info">
          <span class="author-name">${doc.authorInfo.name}</span>
          <span class="author-role">${doc.authorInfo.role} · ${doc.authorInfo.expertise}</span>
        </div>`;
    } else {
      document.getElementById('authorSection').style.display = 'none';
    }

    // tags
    const allTags = [...(doc.tags || [])];
    if (doc.entities) {
      doc.entities.forEach(e => { if (!allTags.includes(e)) allTags.push(e); });
    }
    document.getElementById('docTags').innerHTML = `
      <div class="tag-list">
        ${allTags.map(t => `<a href="tag.html?t=${encodeURIComponent(t)}" class="tag">${t}</a>`).join('')}
      </div>`;

    // sidebar
    let sidebarHTML = '';

    // cluster info (있을 때만)
    if (doc.cluster && doc.cluster.pillarTopic) {
      const clusterDocs = doc.cluster.relatedClusterSlugs
        ? doc.cluster.relatedClusterSlugs.map(s => getDocumentBySlug(s)).filter(Boolean)
        : [];
      sidebarHTML += `<div class="sidebar-section"><h3>주제 클러스터</h3>
        <div class="cluster-topic">${doc.cluster.pillarTopic}</div>
        <div class="cluster-sub">${doc.cluster.subTopic} · ${doc.cluster.intentType}</div>
        ${clusterDocs.length ? clusterDocs.map(d =>
          `<a href="document.html?slug=${d.slug}" class="related-link">${d.title}</a>`
        ).join('') : ''}
      </div>`;
    }

    // related docs (수동 연결 + 자동 추천 병합)
    const manualRelated = getRelatedDocuments(doc);
    const autoRelated = getRecommendedDocs(doc, 5);
    const seen = new Set(manualRelated.map(d => d.id));
    const allRelated = [...manualRelated];
    autoRelated.forEach(d => { if (!seen.has(d.id)) { allRelated.push(d); seen.add(d.id); } });
    const finalRelated = allRelated.slice(0, 6);
    if (finalRelated.length) {
      sidebarHTML += `<div class="sidebar-section"><h3>관련 문서</h3>
        ${finalRelated.map(r => `<a href="document.html?slug=${r.slug}" class="related-link">${r.title}</a>`).join('')}
      </div>`;
    }

    // category
    if (cat) {
      const catDocs = getDocumentsByCategory(cat.id).filter(d => d.id !== doc.id).slice(0, 5);
      sidebarHTML += `<div class="sidebar-section"><h3>${cat.icon} ${cat.nameKo} 문서</h3>
        ${catDocs.map(d => `<a href="document.html?slug=${d.slug}" class="related-link">${d.title}</a>`).join('')}
        <a href="categories.html?id=${cat.id}" class="related-link" style="color:var(--primary)">전체 보기 →</a>
      </div>`;
    }

    // services
    if (doc.relatedServices && doc.relatedServices.length) {
      const svcs = doc.relatedServices.map(id => SERVICES.find(s => s.id === id)).filter(Boolean);
      sidebarHTML += `<div class="sidebar-section"><h3>관련 서비스</h3>
        ${svcs.map(s => `
          <a href="services.html" class="related-link">
            ${s.icon} ${s.name}<br>
            <small style="color:var(--gray-400)">${s.description}</small>
          </a>`).join('')}
      </div>`;
    }

    document.getElementById('sidebar').innerHTML = sidebarHTML;
  }
  </script>
</body>
</html>
